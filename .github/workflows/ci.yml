name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test with coverage gate (core modules)
        run: |
          uv run pytest -q \
            --cov=dcs.cli \
            --cov=dcs.router \
            --cov=dcs.types \
            --cov=eval.metrics \
            --cov=eval.runner \
            --cov-report=term-missing \
            --cov-report=xml:coverage-core.xml \
            --cov-fail-under=80

      - name: Full coverage snapshot (non-gating)
        run: |
          uv run pytest -q \
            --cov=dcs \
            --cov=benchmarks \
            --cov=eval \
            --cov-report=term \
            --cov-report=xml:coverage-full.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage-core.xml
            coverage-full.xml
          if-no-files-found: error

      - name: Build
        run: uv build
